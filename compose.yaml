# Please refer https://aka.ms/HTTPSinContainer on how to setup an https developer certificate for your ASP.NET Core service.

services:
  crm-api:
    image: momentum-crm-api:latest
    build: 
      context: .
      dockerfile: MomentumCRM.Api/Dockerfile
    ports:
      - "5285:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: momentum
      POSTGRES_PASSWORD: localdevpassword
      POSTGRES_DB: momentumcrm
    ports:
      - "5432:5432"
    volumes:
      - momentum-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U momentum -d momentumcrm"]
      interval: 5s
      timeout: 5s
      retries: 5
    
volumes:
  momentum-pgdata: